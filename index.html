<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>JuliaLabApp</title>
  <link rel="stylesheet" href="ribbon.css" />
  <script defer src="renderer.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e1e1e;
    }
  </style>
</head>
<body>
  <div id="ribbon">
    <div id="ribbon-tabs">
      <span class="ribbon-tab active">HOME</span>
      <span class="ribbon-tab">PLOTS</span>
      <span class="ribbon-tab">APPS</span>
      <span class="ribbon-tab">LIVE EDITOR</span>
      <span class="ribbon-tab">INSERT</span>
      <span class="ribbon-tab">VIEW</span>
    </div>
    <div id="win-controls">
      <button class="win-btn" id="btn-minimize">&#x2500;</button>
      <button class="win-btn" id="btn-maximize">&#x25A1;</button>
      <button class="win-btn" id="btn-close">&#x2715;</button>
    </div>
  </div>
</body>
</html>
